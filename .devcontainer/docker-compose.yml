version: "3.9"

services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-24.04
    volumes:
      - ..:/workspaces/bx-ai:cached
    working_dir: /workspaces/bx-ai
    command: sleep infinity
    depends_on:
      cassandra:
        condition: service_healthy
    environment:
      # Keep Gradle happy inside containers
      GRADLE_USER_HOME: /workspaces/bx-ai/.gradle

  cassandra:
    image: cassandra:5.0
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: "bx-ai"
      CASSANDRA_DC: "datacenter1"
      CASSANDRA_RACK: "rack1"
      CASSANDRA_ENDPOINT_SNITCH: "GossipingPropertyFileSnitch"
      # Single node / dev friendly
      MAX_HEAP_SIZE: "1G"
      HEAP_NEWSIZE: "256M"
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT release_version FROM system.local' 127.0.0.1 9042 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 40s
